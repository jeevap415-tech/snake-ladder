<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Snakes & Ladders - Classic Board Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Game Container */
        .game-container {
            max-width: 1400px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Header */
        .game-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .game-header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .game-header p {
            opacity: 0.9;
        }

        /* Main Content */
        .game-content {
            display: flex;
            flex-wrap: wrap;
            padding: 20px;
            gap: 20px;
        }

        /* Board Section */
        .board-section {
            flex: 2;
            min-width: 300px;
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .board {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            background: #ffd89b;
            background: linear-gradient(135deg, #ffd89b 0%, #f8e6b0 100%);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }

        .cell {
            aspect-ratio: 1;
            border: 1px solid rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            position: relative;
            background: rgba(255,255,255,0.7);
            transition: all 0.3s ease;
        }

        .cell:hover {
            transform: scale(1.05);
            z-index: 10;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .cell-number {
            font-size: 10px;
            color: #666;
            position: absolute;
            top: 3px;
            left: 3px;
        }

        .cell-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }

        .ladder-icon {
            font-size: 24px;
            animation: bounce 0.5s ease;
        }

        .snake-icon {
            font-size: 24px;
            animation: shake 0.5s ease;
        }

        .player-token {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            color: white;
            margin: 0 2px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            animation: popIn 0.3s ease-out;
        }

        @keyframes popIn {
            from {
                transform: scale(0);
            }
            to {
                transform: scale(1);
            }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* Info Section */
        .info-section {
            flex: 1;
            min-width: 280px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Players Panel */
        .players-panel {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            padding: 20px;
            color: white;
        }

        .players-panel h3 {
            margin-bottom: 15px;
            text-align: center;
        }

        .player-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .player-item {
            background: rgba(255,255,255,0.2);
            padding: 12px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .player-item.active {
            background: rgba(255,255,255,0.4);
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(255,255,255,0.3);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 15px rgba(255,255,255,0.3); }
            50% { box-shadow: 0 0 25px rgba(255,255,255,0.6); }
        }

        .player-name {
            font-weight: bold;
            font-size: 1.1em;
        }

        .player-position {
            background: rgba(0,0,0,0.3);
            padding: 5px 10px;
            border-radius: 20px;
            font-weight: bold;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(0,0,0,0.2);
            border-radius: 3px;
            margin-top: 8px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #4caf50;
            transition: width 0.5s ease;
        }

        /* Dice Section */
        .dice-section {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .dice {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            background: white;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: all 0.3s ease;
            animation: roll 0.5s ease;
        }

        .dice:hover {
            transform: scale(1.05);
        }

        .dice.rolling {
            animation: rollAnim 0.3s ease infinite;
        }

        @keyframes rollAnim {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .roll-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.1em;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }

        .roll-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .roll-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Message Area */
        .message-area {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 15px;
            min-height: 100px;
            overflow-y: auto;
            font-size: 0.9em;
        }

        .message {
            padding: 8px;
            margin-bottom: 5px;
            border-radius: 5px;
            animation: slideInLeft 0.3s ease-out;
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #dc3545;
        }

        .message.info {
            background: #d1ecf1;
            color: #0c5460;
            border-left: 4px solid #17a2b8;
        }

        .message.warning {
            background: #fff3cd;
            color: #856404;
            border-left: 4px solid #ffc107;
        }

        /* Setup Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            max-width: 400px;
            width: 90%;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-content h2 {
            margin-bottom: 20px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
        }

        .start-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 25px;
            font-size: 1.1em;
            cursor: pointer;
            margin-top: 10px;
        }

        /* Stats Panel */
        .stats-panel {
            background: white;
            border-radius: 15px;
            padding: 15px;
            margin-top: 10px;
        }

        .stats-panel h4 {
            margin-bottom: 10px;
            color: #667eea;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            font-size: 0.9em;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .cell {
                font-size: 8px;
            }
            
            .cell-number {
                font-size: 6px;
            }
            
            .ladder-icon, .snake-icon {
                font-size: 16px;
            }
            
            .player-token {
                width: 18px;
                height: 18px;
                font-size: 8px;
            }
            
            .dice {
                width: 80px;
                height: 80px;
                font-size: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container" id="gameContainer">
        <div class="game-header">
            <h1>🐍 Snakes & Ladders 🪜</h1>
            <p>The Classic Board Game - HTML5 Edition</p>
        </div>
        <div class="game-content">
            <div class="board-section">
                <div class="board" id="board"></div>
            </div>
            <div class="info-section">
                <div class="players-panel">
                    <h3>👥 Players</h3>
                    <div class="player-list" id="playerList"></div>
                </div>
                <div class="dice-section">
                    <div class="dice" id="dice">🎲</div>
                    <button class="roll-btn" id="rollBtn" disabled>Roll Dice</button>
                </div>
                <div class="stats-panel" id="statsPanel" style="display: none;">
                    <h4>📊 Game Statistics</h4>
                    <div id="statsContent"></div>
                </div>
                <div class="message-area" id="messageArea">
                    <div class="message info">🎮 Welcome to Snakes & Ladders!</div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="setupModal">
        <div class="modal-content">
            <h2>🎮 Game Setup</h2>
            <div class="form-group">
                <label>Number of Players (2-4):</label>
                <select id="playerCount">
                    <option value="2">2 Players</option>
                    <option value="3">3 Players</option>
                    <option value="4">4 Players</option>
                </select>
            </div>
            <div id="playerNamesContainer"></div>
            <div class="form-group">
                <label>Game Mode:</label>
                <select id="gameMode">
                    <option value="normal">Normal Mode</option>
                    <option value="fast">Fast Mode (Extra turn on 6)</option>
                    <option value="practice">Practice Mode (No snakes/ladders)</option>
                </select>
            </div>
            <button class="start-btn" onclick="startGame()">Start Game 🎲</button>
        </div>
    </div>

    <script>
        // Game Configuration
        const LADDERS = {
            4: 14, 9: 31, 20: 38, 28: 84,
            40: 59, 51: 67, 63: 81, 71: 91
        };
        
        const SNAKES = {
            17: 7, 54: 34, 62: 19, 64: 60,
            87: 24, 93: 73, 95: 75, 99: 78
        };
        
        const COLORS = [
            '#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4'
        ];
        
        // Game State
        let gameState = {
            players: [],
            currentPlayer: 0,
            gameMode: 'normal',
            gameActive: true,
            stats: {
                rolls: [],
                snakesHit: [],
                laddersTaken: []
            }
        };
        
        // Helper Functions
        function addMessage(text, type = 'info') {
            const messageArea = document.getElementById('messageArea');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            messageDiv.textContent = text;
            messageArea.appendChild(messageDiv);
            messageArea.scrollTop = messageArea.scrollHeight;
            
            // Auto remove old messages (keep last 20)
            while (messageArea.children.length > 20) {
                messageArea.removeChild(messageArea.firstChild);
            }
        }
        
        function getPlayerColor(index) {
            return COLORS[index % COLORS.length];
        }
        
        // Board Drawing
        function createBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            
            for (let row = 9; row >= 0; row--) {
                const isEvenRow = row % 2 === 0;
                for (let col = 0; col < 10; col++) {
                    const number = isEvenRow ? (row * 10 + col + 1) : (row * 10 + (10 - col));
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.id = `cell-${number}`;
                    
                    const numberSpan = document.createElement('div');
                    numberSpan.className = 'cell-number';
                    numberSpan.textContent = number;
                    cell.appendChild(numberSpan);
                    
                    const contentDiv = document.createElement('div');
                    contentDiv.className = 'cell-content';
                    
                    if (LADDERS[number]) {
                        const ladderIcon = document.createElement('div');
                        ladderIcon.className = 'ladder-icon';
                        ladderIcon.textContent = '🪜';
                        contentDiv.appendChild(ladderIcon);
                    } else if (SNAKES[number]) {
                        const snakeIcon = document.createElement('div');
                        snakeIcon.className = 'snake-icon';
                        snakeIcon.textContent = '🐍';
                        contentDiv.appendChild(snakeIcon);
                    }
                    
                    cell.appendChild(contentDiv);
                    board.appendChild(cell);
                }
            }
        }
        
        function updateBoard() {
            // Clear all tokens
            document.querySelectorAll('.player-token').forEach(token => token.remove());
            
            // Add tokens for each player
            gameState.players.forEach((player, index) => {
                if (player.position > 0 && player.position <= 100) {
                    const cell = document.getElementById(`cell-${player.position}`);
                    if (cell) {
                        const token = document.createElement('div');
                        token.className = 'player-token';
                        token.style.backgroundColor = getPlayerColor(index);
                        token.textContent = index + 1;
                        token.title = player.name;
                        cell.querySelector('.cell-content').appendChild(token);
                    }
                }
            });
        }
        
        // Player List Update
        function updatePlayerList() {
            const playerList = document.getElementById('playerList');
            playerList.innerHTML = '';
            
            gameState.players.forEach((player, index) => {
                const playerDiv = document.createElement('div');
                playerDiv.className = `player-item ${index === gameState.currentPlayer && gameState.gameActive ? 'active' : ''}`;
                
                const nameSpan = document.createElement('div');
                nameSpan.className = 'player-name';
                nameSpan.style.color = getPlayerColor(index);
                nameSpan.textContent = player.name;
                
                const infoDiv = document.createElement('div');
                infoDiv.style.textAlign = 'right';
                
                const posSpan = document.createElement('div');
                posSpan.className = 'player-position';
                posSpan.textContent = `${player.position}/100`;
                
                const progressBar = document.createElement('div');
                progressBar.className = 'progress-bar';
                const progressFill = document.createElement('div');
                progressFill.className = 'progress-fill';
                progressFill.style.width = `${(player.position / 100) * 100}%`;
                progressFill.style.backgroundColor = getPlayerColor(index);
                progressBar.appendChild(progressFill);
                
                infoDiv.appendChild(posSpan);
                infoDiv.appendChild(progressBar);
                
                playerDiv.appendChild(nameSpan);
                playerDiv.appendChild(infoDiv);
                playerList.appendChild(playerDiv);
            });
        }
        
        // Dice Roll Animation
        async function rollDice() {
            return new Promise((resolve) => {
                const dice = document.getElementById('dice');
                let rolls = 0;
                const maxRolls = 10;
                const interval = setInterval(() => {
                    const randomValue = Math.floor(Math.random() * 6) + 1;
                    const diceFaces = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
                    dice.textContent = diceFaces[randomValue - 1];
                    rolls++;
                    if (rolls >= maxRolls) {
                        clearInterval(interval);
                        const finalValue = Math.floor(Math.random() * 6) + 1;
                        dice.textContent = diceFaces[finalValue - 1];
                        resolve(finalValue);
                    }
                }, 50);
            });
        }
        
        // Game Logic
        async function playTurn() {
            if (!gameState.gameActive) return;
            
            const currentPlayerObj = gameState.players[gameState.currentPlayer];
            addMessage(`${currentPlayerObj.name}'s turn! 🎲`, 'info');
            
            // Disable roll button during turn
            const rollBtn = document.getElementById('rollBtn');
            rollBtn.disabled = true;
            
            // Roll dice
            const roll = await rollDice();
            addMessage(`${currentPlayerObj.name} rolled a ${roll}! 🎲`, 'success');
            
            // Track stats
            if (!gameState.stats.rolls[gameState.currentPlayer]) {
                gameState.stats.rolls[gameState.currentPlayer] = [];
            }
            gameState.stats.rolls[gameState.currentPlayer].push(roll);
            
            const oldPosition = currentPlayerObj.position;
            let newPosition = oldPosition + roll;
            
            // Check for overshoot
            if (newPosition > 100) {
                addMessage(`⚠️ Too high! Need exactly ${100 - oldPosition} to win. ${currentPlayerObj.name} stays at ${oldPosition}.`, 'warning');
                endTurn();
                rollBtn.disabled = false;
                return;
            }
            
            currentPlayerObj.position = newPosition;
            addMessage(`${currentPlayerObj.name} moved from ${oldPosition} → ${newPosition}`, 'info');
            updateBoard();
            updatePlayerList();
            
            // Check win
            if (newPosition === 100) {
                addMessage(`🏆 ${currentPlayerObj.name} wins the game! Congratulations! 🎉`, 'success');
                gameState.gameActive = false;
                showStats();
                rollBtn.disabled = true;
                return;
            }
            
            // Check special squares (if not practice mode)
            if (gameState.gameMode !== 'practice') {
                if (LADDERS[newPosition]) {
                    const ladderTop = LADDERS[newPosition];
                    currentPlayerObj.position = ladderTop;
                    addMessage(`🪜 LADDER! ${currentPlayerObj.name} climbs from ${newPosition} to ${ladderTop}!`, 'success');
                    
                    if (!gameState.stats.laddersTaken[gameState.currentPlayer]) {
                        gameState.stats.laddersTaken[gameState.currentPlayer] = 0;
                    }
                    gameState.stats.laddersTaken[gameState.currentPlayer]++;
                    
                    updateBoard();
                    updatePlayerList();
                } else if (SNAKES[newPosition]) {
                    const snakeTail = SNAKES[newPosition];
                    currentPlayerObj.position = snakeTail;
                    addMessage(`🐍 SNAKE! ${currentPlayerObj.name} slides from ${newPosition} to ${snakeTail}!`, 'error');
                    
                    if (!gameState.stats.snakesHit[gameState.currentPlayer]) {
                        gameState.stats.snakesHit[gameState.currentPlayer] = 0;
                    }
                    gameState.stats.snakesHit[gameState.currentPlayer]++;
                    
                    updateBoard();
                    updatePlayerList();
                }
            }
            
            // Fast mode: extra turn on 6
            if (gameState.gameMode === 'fast' && roll === 6) {
                addMessage(`⭐ Extra turn for rolling a 6! ⭐`, 'success');
                rollBtn.disabled = false;
                return;
            }
            
            endTurn();
            rollBtn.disabled = false;
        }
        
        function endTurn() {
            gameState.currentPlayer = (gameState.currentPlayer + 1) % gameState.players.length;
            updatePlayerList();
            addMessage(`🔄 ${gameState.players[gameState.currentPlayer].name}'s turn next`, 'info');
        }
        
        function showStats() {
            const statsPanel = document.getElementById('statsPanel');
            const statsContent = document.getElementById('statsContent');
            
            statsContent.innerHTML = '';
            gameState.players.forEach((player, index) => {
                const stats = gameState.stats;
                const rolls = stats.rolls[index] || [];
                const avgRoll = rolls.length ? (rolls.reduce((a, b) => a + b, 0) / rolls.length).toFixed(2) : 0;
                const maxRoll = rolls.length ? Math.max(...rolls) : 0;
                const snakes = stats.snakesHit[index] || 0;
                const ladders = stats.laddersTaken[index] || 0;
                
                const statDiv = document.createElement('div');
                statDiv.className = 'stat-item';
                statDiv.innerHTML = `
                    <strong style="color: ${getPlayerColor(index)}">${player.name}</strong>
                    <div>
                        <div>Rolls: ${rolls.length} | Avg: ${avgRoll}</div>
                        <div>🪜 ${ladders} | 🐍 ${snakes}</div>
                    </div>
                `;
                statsContent.appendChild(statDiv);
            });
            
            statsPanel.style.display = 'block';
        }
        
        // Game Setup
        function startGame() {
            const playerCount = parseInt(document.getElementById('playerCount').value);
            const gameMode = document.getElementById('gameMode').value;
            
            // Get player names
            const players = [];
            for (let i = 0; i < playerCount; i++) {
                const nameInput = document.getElementById(`playerName${i}`);
                const name = nameInput ? nameInput.value.trim() : `Player ${i + 1}`;
                players.push({
                    name: name || `Player ${i + 1}`,
                    position: 0
                });
            }
            
            gameState = {
                players: players,
                currentPlayer: 0,
                gameMode: gameMode,
                gameActive: true,
                stats: {
                    rolls: [],
                    snakesHit: [],
                    laddersTaken: []
                }
            };
            
            // Reset UI
            document.getElementById('messageArea').innerHTML = '<div class="message info">🎮 Game Started! Good luck!</div>';
            document.getElementById('statsPanel').style.display = 'none';
            document.getElementById('rollBtn').disabled = false;
            
            createBoard();
            updatePlayerList();
            
            // Close modal
            document.getElementById('setupModal').style.display = 'none';
            
            addMessage(`Game started with ${playerCount} players in ${gameMode} mode!`, 'success');
            addMessage(`${gameState.players[0].name} goes first!`, 'info');
        }
        
        // Setup Modal UI
        function updatePlayerNames() {
            const playerCount = parseInt(document.getElementById('playerCount').value);
            const container = document.getElementById('playerNamesContainer');
            container.innerHTML = '';
            
            for (let i = 0; i < playerCount; i++) {
                const div = document.createElement('div');
                div.className = 'form-group';
                div.innerHTML = `
                    <label>Player ${i + 1} Name:</label>
                    <input type="text" id="playerName${i}" placeholder="Player ${i + 1}" value="Player ${i + 1}">
                `;
                container.appendChild(div);
            }
        }
        
        // Event Listeners
        document.getElementById('playerCount').addEventListener('change', updatePlayerNames);
        document.getElementById('rollBtn').addEventListener('click', playTurn);
        
        // Initialize
        createBoard();
        updatePlayerNames();
        document.getElementById('setupModal').style.display = 'flex';
        
        // Add some visual flair to cells
        function addCellEffects() {
            const cells = document.querySelectorAll('.cell');
            cells.forEach(cell => {
                cell.addEventListener('mouseenter', () => {
                    cell.style.transform = 'scale(1.02)';
                    cell.style.zIndex = '10';
                });
                cell.addEventListener('mouseleave', () => {
                    cell.style.transform = 'scale(1)';
                    cell.style.zIndex = '1';
                });
            });
        }
        
        // Call after board creation
        const observer = new MutationObserver(() => {
            addCellEffects();
        });
        observer.observe(document.getElementById('board'), { childList: true, subtree: true });
    </script>
</body>
</html>
